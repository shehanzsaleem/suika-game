<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suika / Watermelon Game Clone</title>
  <meta property="og:title" content="Suika / Watermelon Game Clone" />
  <meta property="og:image" content="https://tombofry.github.io/suika-game/screenshot.png" />
  <style>
    @import url(https://fonts.bunny.net/css?family=azeret-mono:400,700,900);

    :root {
      --col-bg: #FFD59D;
      --col-bg-light: #FFDCAE;
      --col-bg-lighter: #FFEEDB;
      --col-primary: #FF5300;
      --col-primary-dark: #FF2700;
      --col-primary-light: #FF8800;
      --col-shadow: rgba(0, 0, 0, 0.25);
      --col-white: #fff;
    }

    * {
      box-sizing: border-box;
      padding: 0;
      margin: 0;
      line-height: 1;
    }

    body {
      background-color: var(--col-bg);
      font-family: 'Azeret Mono', sans-serif;
    }

    .container {
      width: 100%;
      max-width: 640px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    #game-canvas {
      position: relative;
    }

    #game-ui {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
      user-select: none;
      font-weight: 700;
      display: none;
      transform-origin: top left;
    }

    #game-score {
      display: none;
    }

    #game-end-container {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-items: center;
      background-color: var(--col-shadow);
    }

    #game-end {
      text-align: center;
      padding: 32px 48px;
      background-color: var(--col-bg-lighter);
      border: 5px solid var(--col-primary);
      box-shadow: 0 4px 32px var(--col-shadow);
      border-radius: 32px;
      margin: 0 auto;
      pointer-events: initial;
      user-select: initial;
    }

    #game-end-title {
      font-weight: 700;
      font-size: 48px;
      color: var(--col-primary-dark);
    }

    #game-end-link {
      display: inline-block;
      color: var(--col-white);
      font-size: 24px;
      text-decoration: none;
      background-color: var(--col-primary-light);
      margin-top: 16px;
      padding: 16px;
      border-radius: 16px;
      box-shadow: 4px 4px 0 var(--col-shadow);
    }

    #game-end-link:hover {
      background-color: var(--col-primary);
      box-shadow: 6px 6px 0 var(--col-shadow);
    }

    #game-status {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 48px;
      background-color: var(--col-bg-lighter);
      display: flex;
      align-items: center;
      flex-wrap: wrap;
    }

    .game-status-item {
      display: flex;
      line-height: 1;
      align-items: center;
      margin-right: 24px;
    }

    .game-status-item:first-child .game-status-label {
      margin-left: 16px;
    }

    .game-status-label {
      color: #666;
      font-size: 16px;
      margin-right: 6px;
    }

    #game-score-value,
    #game-highscore-value {
      color: #333;
      font-weight: 700;
      font-size: 24px;
    }

    #game-next-fruit {
      width: 24px;
      height: 24px;
    }

    /* Danger line: visible horizontal line near top; overflow above this triggers loss after grace period */
    #danger-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--col-primary-dark);
      box-shadow: 0 0 8px rgba(255, 39, 0, 0.6);
      pointer-events: none;
      display: none;
    }

    /* Fruit progression panel: static row of fruit icons under the game board */
    .fruit-progression-panel {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 4px 8px;
      padding: 12px 16px;
      background: var(--col-bg-lighter);
      border-top: 2px solid var(--col-primary);
    }
    .fruit-progression-item {
      display: inline-flex;
    }
    .fruit-progression-icon {
      display: block;
    }
    .fruit-progression-arrow {
      color: var(--col-primary);
      font-size: 20px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="container" id="game-container">
    <div id="game-canvas">
      <div id="game-ui">
        <p id="game-score" aria-hidden="true"></p>

        <!-- Danger line: fruits above this for too long trigger game over -->
        <div id="danger-line" class="danger-line" aria-hidden="true"></div>

        <div id="game-end-container">
          <div id="game-end">
            <div id="game-end-title">Game Over!</div>
            <a id="game-end-link" href="">Try Again</a>
          </div>
        </div>

        <div id="game-status">
          <div class="game-status-item">
            <span class="game-status-label">Score</span>
            <div id="game-score-value">0</div>
          </div>
          <div class="game-status-item">
            <span class="game-status-label">Highscore</span>
            <div id="game-highscore-value">0</div>
          </div>
          <div class="game-status-item">
            <span class="game-status-label">Next</span>
            <img id="game-next-fruit" src="./assets/img/circle0.png" alt="" />
          </div>
        </div>
      </div>
    </div>
    <!-- Fruit progression chain is injected here by FruitProgressionPanel.js -->
  </div>
  <script type="text/javascript" src="./matter.js"></script>
  <script type="text/javascript" src="./logic/fruitFactory.js"></script>
  <script type="text/javascript" src="./index.js?v=5"></script>
  <script type="text/javascript" src="./logic/dangerLineLogic.js"></script>
  <script type="text/javascript" src="./components/FruitProgressionPanel.js"></script>
  <script type="text/javascript" src="./agents/RandomDropAgent.js"></script>
</body>
</html>
